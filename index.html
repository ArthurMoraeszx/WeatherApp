<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Digite a cidade" spellcheck="false">
            <button><img src="img/images/search.png"></button>
        </div>
        <div class="error">
            <p>Cidade Invalida</p>
        </div>
            <div class="weather">
                <img src="img/images/rain.png" class="weather-icon">
                <h1 class="temp">22°c</h1>
                <h2 class="city">Recife</h2>
                <div class="details">
                <div class="col">
                    <img src="img/images/humidity.png">
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidade</p>
                    </div>
                </div>
                <div class="col">
                    <img src="img/images/wind.png">
                    <div>
                        <p class="wind">15km/hr</p>
                        <p>Velocidade <br>do vento</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="script.js"></script>
</body>
</html>
